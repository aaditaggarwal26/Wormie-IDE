appId: com.wormie.learnbeforeyoucode
productName: Wormie
directories:
  output: release
files:
  - out/**
  - package.json
asar: true
npmRebuild: false
asarUnpack:
  - node_modules/@openai/codex-*/vendor/**
  - node_modules/node-pty/**
protocols:
  - name: Wormie classroom invitation
    schemes:
      - wormie
win:
  target: nsis
mac:
  target:
    - dmg
    - zip
linux:
  target:
    - AppImage
    - deb
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
