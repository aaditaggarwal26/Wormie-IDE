appId: com.wormie.learnbeforeyoucode
productName: Wormie
directories:
  output: release
files:
  - out/**
  - package.json
asar: true
asarUnpack:
  - node_modules/@openai/codex-*/vendor/**
win:
  target: nsis
mac:
  target:
    - dmg
    - zip
linux:
  target:
    - AppImage
    - deb
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
