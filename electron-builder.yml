appId: com.wormie.learnbeforeyoucode
productName: Learn Before You Code
directories:
  output: release
files:
  - out/**
  - package.json
asar: true
win:
  target: nsis
mac:
  target:
    - dmg
    - zip
linux:
  target:
    - AppImage
    - deb
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
